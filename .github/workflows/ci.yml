name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-gate:
    name: Python ${{ matrix.python-version }} / regression gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Cache Poetry dependencies and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-py${{ matrix.python-version }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev,docs

      - name: Run tests
        run: poetry run pytest

      - name: Run lint checks
        run: poetry run ruff check .

      - name: Verify formatting
        run: poetry run ruff format --check .

      - name: Run deterministic evals
        run: poetry run oterminus-evals

      - name: Check generated command reference docs
        run: poetry run python scripts/generate_command_reference.py --check

      - name: Check docs links and consistency
        run: poetry run python scripts/check_docs_links.py

      - name: Build docs (strict)
        run: poetry run mkdocs build --strict

      - name: Validate installed package smoke checks
        run: poetry run python scripts/validate_package_install.py

  macos-smoke:
    name: macOS Python 3.13 / platform smoke
    runs-on: macos-latest
    env:
      PYTHON_VERSION: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Cache Poetry dependencies and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev,docs

      - name: Run platform smoke tests
        run: >
          poetry run pytest
          tests/test_command_registry.py
          tests/test_completion.py
          tests/test_direct_commands.py
          tests/test_validator.py
          tests/test_shell_completion.py
          tests/test_config.py
          tests/test_config_cli.py

      - name: Run lint checks
        run: poetry run ruff check .

      - name: Validate installed package smoke checks
        run: poetry run python scripts/validate_package_install.py
